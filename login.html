<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
        <h3>FACEBOOK LOGIN PAGE</h3>
        <hr>

        <form action="">
            <label for="mail">Email address :</label> <br>
            <input type="email" name="mail" id="mail" placeholder="Email Address " required> <br> <br>
            <label for="pwd">Password :</label> <br>
            <input type="password" name="pwd" id="pwd" placeholder="Password" required minlength="8"> 
            <p> <b>please enter minimum 8 characters </b></p> <br> 
        
            <input type="submit" name="Log in "> <br> <br>

            <a href="register.html">Create New Account</a>

        </form>
</body>
</html>
