<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form action="">
        First Name : <input type="text" name ='fname' placeholder="Enter your First Name" > <br> 
        Last Name : <input type="text" name ='lname' placeholder="Enter your Last Name" > <br> 
        Email : <input type="email" name ='mail' placeholder="Enter Email Address" > <br> 
        Password : <input type="password" name="pwd"> <br> 

        <h4>Gender: </h4>
        <label><input type="radio" name="gender"  value="Male" > Male  </label> <br>
        <label><input type="radio" name="gender" value="Female"> Female </label> <br>
        <label><input type="radio" name="gender" value="Other"> Other </label> <br> <br>

        Age: <input type="number" min="18" max="60">

        <h4>Preferences : </h4>

        <label> Acrylic Painting  <input type="checkbox" name="interest"  value="Acrylic Painting ">  </label> <br>
        <label>Oil Paintaing <input type="checkbox"  name="interest" value="Oil Paintaing " >  </label> <br>
        <label> Water Color Paintaing <input type="checkbox" name="interest"  value=" Water Color Paintaing ">  </label> <br> <br>

          
        <label for="job">Select Occupation :</label>
        <select name="job" id="job">
            <option disabled selected >Choose Color: </option>
            <option value="Student">Student</option>
            <option value="Not-Working">Not-Working</option>
            <option value="Engineer">Engineer</option>
        </select>    
        <br> <br>

        Bio : <textarea name="bio"  placeholder="Share few lines about yourself..." ></textarea>

        <br> <br>

        <input type="reset" value="RESET">
        <input type="submit" value="SUBMIT">

        



    </form>
</body>
</html>
