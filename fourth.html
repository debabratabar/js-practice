<!DOCTYPE html>
<html >
<head>
    <title>List practice</title>
</head>
<body>
    <h2>ordered List </h2>
    <ol>
        <li>Red</li>
        <li>Green</li>
        <li>black</li>
        <li>orange</li>
    </ol>
    
    <h2>un-ordered list</h2>
    <ul>
        <li>Red</li>
        <li>Green</li>
        <li>black</li>
        <li>orange</li>
    </ul>

    <h2>ordered List </h2>
    <ol>
        <li>Red
            <ul>
                <li>Red 1 </li>
                <li>Red 2 </li>
            </ul>
        </li>
        <li>Green
            <ul>
                <li>Green 1 </li>
                <li>Green 2 </li>
            </ul>
        </li>  
        <li>black</li>
        <li>orange</li>
    </ol>
</body>
</html>
